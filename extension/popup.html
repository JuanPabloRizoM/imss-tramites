<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Trámites IMSS</title>
    <style>
      :root {
        --paper: #fafaf6;
        --paper-2: #f3f1ea;
        --ink: #16181d;
        --ink-2: #5a5d65;
        --ink-3: #93969d;
        --line: #e3e0d7;
        --accent: #8a4a35;
        --ok: #2e7d32;
        --err: #b91c1c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 360px;
        padding: 16px;
        background: var(--paper);
        color: var(--ink);
        font: 14px/1.4 -apple-system, "Segoe UI", system-ui, sans-serif;
      }
      .eyebrow {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-3);
        margin: 0 0 6px;
      }
      h1 {
        font-family: Georgia, "Times New Roman", serif;
        font-style: italic;
        font-size: 22px;
        line-height: 1.1;
        margin: 0 0 16px;
        color: var(--ink);
      }
      label { display: block; font-size: 12px; color: var(--ink-2); margin: 8px 0 4px; }
      input, select {
        width: 100%;
        height: 36px;
        padding: 0 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        font: inherit;
      }
      input:focus, select:focus { outline: 2px solid var(--ink); outline-offset: 1px; }
      button {
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--paper-2);
        color: var(--ink);
        font: inherit;
        font-weight: 500;
        cursor: pointer;
      }
      button:hover:not(:disabled) { background: #fff; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      button.primary {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }
      button.primary:hover:not(:disabled) { background: #2a2c33; }
      .row { display: flex; gap: 8px; }
      .msg {
        margin-top: 10px;
        font-size: 12px;
        color: var(--ink-2);
        min-height: 1em;
      }
      .msg.err { color: var(--err); }
      .msg.ok  { color: var(--ok); }
      .meta {
        font-size: 11px;
        color: var(--ink-3);
        margin: 6px 0 0;
      }
      .hint {
        font-size: 11px;
        color: var(--ink-3);
        margin: 4px 0 12px;
      }
    </style>
  </head>
  <body>
    <p class="eyebrow">Trámites IMSS</p>
    <h1>Llenar el <em>portal</em></h1>

    <div id="loading-block" hidden>
      <p class="msg">Cargando…</p>
    </div>

    <div id="config-block" hidden>
      <p class="meta">Configura una sola vez. Estos datos se quedan en tu navegador.</p>
      <label for="cfg-url">URL del proyecto Supabase</label>
      <input id="cfg-url" type="url" placeholder="https://xxxxx.supabase.co" />
      <label for="cfg-key">Anon public key</label>
      <input id="cfg-key" type="password" placeholder="eyJ..." />
      <p class="hint">
        Las encuentras en Supabase → Project Settings → API. Usa la <strong>anon</strong>,
        no la service_role.
      </p>
      <button id="cfg-save" class="primary">Guardar</button>
    </div>

    <div id="main-block" hidden>
      <label for="tramite-select">Trámite revisado en la app</label>
      <select id="tramite-select"></select>
      <p id="portal-status" class="meta"></p>

      <div class="row" style="margin-top: 14px;">
        <button id="btn-llenar" class="primary" disabled>Llenar formulario</button>
        <button id="btn-refresh" title="Recargar lista">↻</button>
      </div>

      <p id="msg" class="msg"></p>

      <hr style="border: 0; border-top: 1px solid var(--line); margin: 16px 0;" />
      <button id="btn-dump" style="font-size: 12px;">Copiar estructura de tablas</button>
      <p class="hint">Estando en el portal, copia el HTML de las tablas dinámicas para poder automatizarlas.</p>
      <button id="btn-reset" style="font-size: 12px;">Reconfigurar</button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
